<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - faça Login </title>
    <link rel="stylesheet" href="estilo/style.css">
    <link rel="shortcut icon" href="Facebook_Logo_Primary.png" type="image/x-icon">
</head>
<body>
    <div class="content">
        <div class="content-info">
            <h1>Facebook</h1>
            <h3>O Facebook ajuda você a conectar e compartilhar com as pessoas que fazem parte da sua vida</h3>
        </div>
        <div class="content-login">
          <form id="login" class="content-login-box" >
             <input id="usuario" type="text" class="inputs" placeholder="Email ou Telefone">
             <input id="senha" type="password" class="inputs" placeholder="Senha">
             <button class="btn btn-enter">Entrar</button>
             <a href="#" class="fogot-password">Esqueceu a senha</a>
             <hr>
             <button type="button" id="btn" class="btn btn-criate-account">Criar nova conta</button>
          </form>
          <p><strong>Criar uma página </strong> para uma celebridade, uma marca ou empresa. </p>
        </div>
    </div>
    <script src="js/controlo.js"></script>
</body>
</html>
